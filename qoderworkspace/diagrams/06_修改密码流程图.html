<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码流程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #344054;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 28px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>修改密码流程</h1>
        <div class="subtitle">Change Password Flow</div>
        <svg viewBox="0 0 800 870" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                    <path d="M 0 0.5 L 9 5 L 0 9.5 z" fill="#6c757d"/>
                </marker>
                <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
                    <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.10"/>
                </filter>
            </defs>
            <rect x="280.0" y="22.0" width="240" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="400" y="50" text-anchor="middle" fill="white" font-size="15" font-weight="bold">进入个人账户·修改密码页面</text>
            <rect x="255.0" y="116.0" width="290" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="145.0" text-anchor="middle" fill="#344054" font-size="13">输入旧密码、新密码、确认新密码</text>
            <rect x="255.0" y="216.0" width="290" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="245.0" text-anchor="middle" fill="#344054" font-size="13">后端校验旧密码是否匹配数据库</text>
            <polygon points="400,320.0 495.0,370 400,420.0 305.0,370" fill="#fef3cd" stroke="#f0c000" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="375" text-anchor="middle" fill="#344054" font-size="13">旧密码是否正确</text>
            <rect x="80.0" y="344.0" width="180" height="52" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="170" y="366.0" text-anchor="middle" fill="#344054" font-size="13">提示密码错误</text>
            <text x="170" y="384.0" text-anchor="middle" fill="#344054" font-size="13">重新填写</text>
            <rect x="255.0" y="482.0" width="290" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="506.0" text-anchor="middle" fill="#344054" font-size="13">BCrypt 加密新密码</text>
            <text x="400" y="524.0" text-anchor="middle" fill="#344054" font-size="13">事务更新数据库</text>
            <rect x="270.0" y="594.0" width="260" height="52" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="616.0" text-anchor="middle" fill="#344054" font-size="13">清除登录缓存</text>
            <text x="400" y="634.0" text-anchor="middle" fill="#344054" font-size="13">强制重新登录</text>
            <rect x="260.0" y="694.0" width="280" height="52" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="716.0" text-anchor="middle" fill="#344054" font-size="13">提示修改密码成功</text>
            <text x="400" y="734.0" text-anchor="middle" fill="#344054" font-size="13">返回个人中心</text>
            <rect x="320.0" y="797.0" width="160" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="400" y="825" text-anchor="middle" fill="white" font-size="15" font-weight="bold">流程结束</text>
            <path d="M 400,68 L 400,116" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,164 L 400,216" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,264 L 400,320" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 305,370 L 260,370" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="282" y="362" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">旧密码错误</text>
            <path d="M 80,370 L 40,370 L 40,140 L 255,140" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,420 L 400,482" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="412" y="451.0" text-anchor="start" fill="#e74c3c" font-size="12" font-weight="bold">旧密码正确</text>
            <path d="M 400,538 L 400,594" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,646 L 400,694" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,746 L 400,797" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
        </svg>
    </div>
</body>
</html>
