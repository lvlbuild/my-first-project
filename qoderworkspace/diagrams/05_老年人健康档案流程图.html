<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年人健康档案管理流程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #344054;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 28px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>老年人健康档案管理流程</h1>
        <div class="subtitle">Elderly Health Record Management Flow</div>
        <svg viewBox="0 0 800 840" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                    <path d="M 0 0.5 L 9 5 L 0 9.5 z" fill="#6c757d"/>
                </marker>
                <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
                    <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.10"/>
                </filter>
            </defs>
            <rect x="285.0" y="22.0" width="230" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="400" y="50" text-anchor="middle" fill="white" font-size="15" font-weight="bold">进入老年人健康档案页面</text>
            <rect x="115.0" y="116.0" width="190" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="210" y="145" text-anchor="middle" fill="#344054" font-size="14">新建老年人档案</text>
            <rect x="80.0" y="212.0" width="260" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="210" y="236.0" text-anchor="middle" fill="#344054" font-size="12">录入基础信息</text>
            <text x="210" y="254.0" text-anchor="middle" fill="#344054" font-size="12">（姓名、身份证、联系方式、紧急联系人）</text>
            <rect x="80.0" y="322.0" width="260" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="210" y="346.0" text-anchor="middle" fill="#344054" font-size="12">录入健康病史</text>
            <text x="210" y="364.0" text-anchor="middle" fill="#344054" font-size="12">（既往病史、过敏史、家族史、用药、生活习惯）</text>
            <rect x="80.0" y="432.0" width="260" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="210" y="456.0" text-anchor="middle" fill="#344054" font-size="12">录入体检数据</text>
            <text x="210" y="474.0" text-anchor="middle" fill="#344054" font-size="12">（生命体征、体格、检验、辅助检查报告）</text>
            <rect x="115.0" y="536.0" width="190" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="210" y="565" text-anchor="middle" fill="#344054" font-size="14">保存档案信息</text>
            <rect x="495.0" y="112.0" width="210" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="600" y="136.0" text-anchor="middle" fill="#344054" font-size="13">检索已有档案</text>
            <text x="600" y="154.0" text-anchor="middle" fill="#344054" font-size="13">（姓名/身份证号）</text>
            <rect x="255.0" y="632.0" width="290" height="56" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="656.0" text-anchor="middle" fill="#344054" font-size="13">时间轴查看全部健康数据</text>
            <text x="400" y="674.0" text-anchor="middle" fill="#344054" font-size="13">异常指标高亮显示</text>
            <rect x="120.0" y="756.0" width="200" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="220" y="785" text-anchor="middle" fill="#344054" font-size="14">编辑/更新档案内容</text>
            <rect x="480.0" y="756.0" width="200" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="580" y="785" text-anchor="middle" fill="#344054" font-size="14">分页导出档案列表</text>
            <path d="M 400,68 L 400,95 L 210,95 L 210,116" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,95 L 600,95 L 600,112" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 210,164 L 210,210" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 210,270 L 210,320" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 210,380 L 210,430" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 210,490 L 210,536" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 210,584 L 210,620 L 400,620 L 400,635" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 600,174 L 600,610 L 410,635" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,690 L 400,720 L 220,720 L 220,756" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,720 L 580,720 L 580,756" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
        </svg>
    </div>
</body>
</html>
