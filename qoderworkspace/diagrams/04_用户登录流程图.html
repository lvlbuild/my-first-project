<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录业务流程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #344054;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 28px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户登录业务流程</h1>
        <div class="subtitle">User Login Business Flow</div>
        <svg viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                    <path d="M 0 0.5 L 9 5 L 0 9.5 z" fill="#6c757d"/>
                </marker>
                <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
                    <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.10"/>
                </filter>
            </defs>
            <rect x="305.0" y="22.0" width="190" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="400" y="50" text-anchor="middle" fill="white" font-size="15" font-weight="bold">打开登录页面</text>
            <rect x="270.0" y="116.0" width="260" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="145" text-anchor="middle" fill="#344054" font-size="14">输入账号、密码、验证码</text>
            <polygon points="400,220.0 490.0,270 400,320.0 310.0,270" fill="#fef3cd" stroke="#f0c000" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="266.0" text-anchor="middle" fill="#344054" font-size="13">点击</text>
            <text x="400" y="284.0" text-anchor="middle" fill="#344054" font-size="13">忘记密码？</text>
            <rect x="70.0" y="246.0" width="180" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="160" y="275" text-anchor="middle" fill="#344054" font-size="14">手机/邮箱重置密码</text>
            <rect x="270.0" y="376.0" width="260" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="405" text-anchor="middle" fill="#344054" font-size="14">提交登录请求</text>
            <polygon points="400,470.0 495.0,520 400,570.0 305.0,520" fill="#fef3cd" stroke="#f0c000" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="525" text-anchor="middle" fill="#344054" font-size="13">校验信息是否正确</text>
            <rect x="75.0" y="496.0" width="170" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="160" y="525" text-anchor="middle" fill="#344054" font-size="14">提示登录失败</text>
            <polygon points="160,610.0 240.0,660 160,710.0 80.0,660" fill="#fef3cd" stroke="#f0c000" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="160" y="665" text-anchor="middle" fill="#344054" font-size="13">失败满5次？</text>
            <rect x="70.0" y="776.0" width="180" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="160" y="805" text-anchor="middle" fill="#344054" font-size="14">账号锁定30分钟</text>
            <rect x="70.0" y="867.0" width="180" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="160" y="895" text-anchor="middle" fill="white" font-size="15" font-weight="bold">流程结束（锁定）</text>
            <polygon points="400,630.0 480.0,680 400,730.0 320.0,680" fill="#fef3cd" stroke="#f0c000" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="400" y="685" text-anchor="middle" fill="#344054" font-size="13">用户角色</text>
            <rect x="150.0" y="796.0" width="180" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="240" y="825" text-anchor="middle" fill="#344054" font-size="14">跳转医生工作台</text>
            <rect x="150.0" y="887.0" width="180" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="240" y="915" text-anchor="middle" fill="white" font-size="15" font-weight="bold">流程结束（医生）</text>
            <rect x="485.0" y="796.0" width="190" height="48" rx="5" fill="#e8f0fe" stroke="#b8d4fe" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="580" y="825" text-anchor="middle" fill="#344054" font-size="14">跳转管理员工作台</text>
            <rect x="485.0" y="887.0" width="190" height="46" rx="23.0" fill="#1a73e8" filter="url(#shadow)"/>
            <text x="580" y="915" text-anchor="middle" fill="white" font-size="15" font-weight="bold">流程结束（管理员）</text>
            <path d="M 400,68 L 400,116" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,164 L 400,220" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 310,270 L 250,270" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="280" y="262" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">是</text>
            <path d="M 70,270 L 40,270 L 40,140 L 270,140" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 400,320 L 400,376" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="412" y="348.0" text-anchor="start" fill="#e74c3c" font-size="12" font-weight="bold">否</text>
            <path d="M 400,424 L 400,470" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 305,520 L 245,520" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="275" y="512" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">错误</text>
            <path d="M 160,544 L 160,610" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 80,660 L 30,660 L 30,140 L 270,140" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="55" y="652" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">否</text>
            <path d="M 160,710 L 160,776" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="172" y="743.0" text-anchor="start" fill="#e74c3c" font-size="12" font-weight="bold">是</text>
            <path d="M 160,824 L 160,867" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 495,520 L 680,520 L 680,680 L 480,680" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="580" y="512" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">正确</text>
            <path d="M 320,680 L 240,680 L 240,796" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="280" y="672" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">医生</text>
            <path d="M 480,680 L 580,680 L 580,796" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <text x="530" y="672" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">管理员</text>
            <path d="M 240,844 L 240,887" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
            <path d="M 580,844 L 580,887" stroke="#6c757d" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
        </svg>
    </div>
</body>
</html>
